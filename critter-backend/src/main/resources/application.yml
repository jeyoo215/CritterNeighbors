spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: critter-backend

  # MySQL 데이터베이스 연결 세팅
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/critter_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234

  # JPA / Hibernate 자동 테이블 생성 세팅
  jpa:
    hibernate:
      ddl-auto: update
      # create : 서버 켤 때마다 테이블을 새로 밀고 만듦
      # update : 기존 테이블을 유지하며 변경사항만 반영
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true

server:
  servlet:
    session:
      timeout: 30m
      cookie:
        same-site: none
        secure: true